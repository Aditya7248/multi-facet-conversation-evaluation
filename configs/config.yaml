# Default configuration. Override any value with an environment variable
# of the same name (uppercased, e.g. retrieval.top_k -> RETRIEVE_TOP_K).

paths:
  raw_facets: data/raw/facets_raw.csv
  cleaned_facets: data/processed/facets_cleaned.csv
  enriched_facets: data/processed/facets_enriched.csv
  enriched_jsonl: data/processed/facets_enriched.jsonl
  faiss_index: data/index/facets.faiss
  faiss_meta: data/index/facets_meta.json

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 64
  normalize: true

retrieval:
  top_k: 20              # facets retrieved per turn (the scaling lever)
  min_score_threshold: 0.0   # always return top-K; let the LLM scorer assign low scores
                              # for facets that don't strongly apply (the rubric handles this).
                              # 0.20 was too aggressive — it silently truncated retrieval for
                              # short / terse turns where similarities cluster below 0.20.

llm:
  backend: ollama        # ollama | vllm | hf
  model: qwen3:8b                  # next-gen Qwen, much stronger reading comprehension than 2.5:7b
  temperature: 0.0
  max_tokens: 256
  request_timeout_s: 120
  json_mode: true        # use structured-output mode where supported

scoring:
  score_levels: [1, 2, 3, 4, 5]   # 5 ordered integers (configurable)
  parallel_workers: 4             # Ollama serializes inference; lower = cleaner logs
  self_consistency_samples: 0     # >0 enables variance-based confidence fallback
  confidence_method: logprobs     # logprobs | self_consistency | hybrid
  cache_enabled: true
  cache_dir: data/processed/score_cache

categories:
  # Used by enrichment + UI grouping. Reviewer can edit/extend freely.
  - linguistic_quality
  - pragmatics
  - safety
  - emotion
  - personality
  - cognition_reasoning
  - relational
  - clinical_health
  - behavioral_lifestyle
  - spirituality_culture
  - other

api:
  host: 0.0.0.0
  port: 8080

ui:
  host: 0.0.0.0
  port: 8501
  api_url: http://localhost:8080
